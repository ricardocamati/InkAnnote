<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDFNotes — Leitor de PDF com Caderno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Tela inicial / upload -->
  <div id="uploadScreen" class="screen upload-screen">
    <div class="upload-card">
      <div class="upload-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="64" height="64">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="12" y1="18" x2="12" y2="12"></line>
          <line x1="9" y1="15" x2="15" y2="15"></line>
        </svg>
      </div>
      <h1>PDFNotes</h1>
      <p class="upload-subtitle">Leia PDFs e escreva anotações lado a lado.</p>
      <div id="dropZone" class="drop-zone">
        <p>Arraste um PDF aqui</p>
        <span class="or">ou</span>
        <button id="openFileBtn" class="btn btn-primary">Abrir arquivo</button>
        <input type="file" id="pdfInput" accept="application/pdf" hidden />
      </div>
      <p class="upload-hint">O arquivo fica apenas no seu dispositivo. Nada é enviado.</p>
      <div id="uploadError" class="toast toast-error hidden" role="alert"></div>
    </div>
  </div>

  <!-- Workspace principal -->
  <div id="workspaceScreen" class="screen workspace-screen hidden">
    <header class="toolbar">
      <div class="toolbar-group">
        <button id="newFileBtn" class="btn btn-ghost" title="Abrir outro PDF">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
          <span>Abrir</span>
        </button>
        <span id="fileName" class="file-name"></span>
      </div>

      <div class="toolbar-group tools">
        <button class="tool-btn active" data-tool="select" title="Seleção (V)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"></path></svg>
        </button>
        <button class="tool-btn" data-tool="highlight" title="Highlight (H)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="m9 11-6 6v3h9l3-3"></path><path d="m22 12-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4"></path><path d="M7.5 12.5l4-4"></path></svg>
        </button>
        <button class="tool-btn" data-tool="pen" title="Caneta (P)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
        </button>
        <button class="tool-btn" data-tool="eraser" title="Borracha (E)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"></path><path d="M22 21H7"></path><path d="m5 11 9 9"></path></svg>
        </button>
        <input type="color" id="colorPicker" value="#FFD700" title="Cor da ferramenta" />
      </div>

      <div class="toolbar-group zoom-group">
        <button id="zoomOut" class="btn btn-icon" title="Zoom out (Ctrl -)">−</button>
        <select id="zoomSelect" title="Nível de zoom">
          <option value="0.5">50%</option>
          <option value="0.75">75%</option>
          <option value="1" selected>100%</option>
          <option value="1.25">125%</option>
          <option value="1.5">150%</option>
          <option value="2">200%</option>
        </select>
        <button id="zoomIn" class="btn btn-icon" title="Zoom in (Ctrl +)">+</button>
      </div>

      <div class="toolbar-group toolbar-actions">
        <button id="previewToggle" class="btn btn-ghost" title="Preview Markdown (Ctrl P)" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          <span>Preview</span>
        </button>
        <button id="themeToggle" class="btn btn-ghost" title="Alternar tema">
          <svg id="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          <svg id="themeIconSun" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
        <div class="dropdown">
          <button id="exportBtn" class="btn btn-secondary" title="Exportar (Ctrl E)">
            <span>Exportar</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
          <div id="exportMenu" class="dropdown-menu hidden">
            <button id="exportMarkdown" class="dropdown-item">Markdown (.md)</button>
            <button id="exportJSON" class="dropdown-item">JSON (.json)</button>
          </div>
        </div>
      </div>
    </header>

    <main class="workspace" id="workspace">
      <section class="panel pdf-panel" id="pdfPanel">
        <div id="pdfLoading" class="skeleton-pdf hidden">
          <div class="skeleton-page"></div>
          <div class="skeleton-page"></div>
        </div>
        <div id="pdfContainer" class="pdf-container">
          <canvas id="pdfCanvasLeft" class="pdf-canvas"></canvas>
          <canvas id="pdfCanvasRight" class="pdf-canvas"></canvas>
          <canvas id="drawingOverlay" class="drawing-overlay"></canvas>
        </div>
        <nav class="panel-nav pdf-nav">
          <button id="pdfPrev" class="btn btn-icon" title="Páginas anteriores (←)">‹</button>
          <div class="nav-pages">
            <span id="pdfPagesLabel">1, 2</span>
            <span class="nav-sep">/</span>
            <span id="pdfTotalPages">0</span>
            <span id="linkedIndicator" class="linked-indicator hidden" title="Folha vinculada a este par de páginas"></span>
          </div>
          <button id="pdfNext" class="btn btn-icon" title="Próximas páginas (→)">›</button>
        </nav>
      </section>

      <div class="resizer" id="resizer" title="Arraste para redimensionar"></div>

      <section class="panel notebook-panel" id="notebookPanel">
        <div id="notebookEmpty" class="notebook-empty">
          <p>Nenhuma folha ainda.</p>
          <button id="createFirstPage" class="btn btn-primary">Criar primeira folha</button>
        </div>
        <div id="notebookPage" class="notebook-page hidden">
          <header class="page-header" id="pageHeader" title="Clique para editar o vínculo">
            <span class="page-icon">📄</span>
            <span id="pageLinkLabel" class="page-link-label">Sem vínculo</span>
            <span class="edit-hint">✏️ editar</span>
            <div id="pageLinkEdit" class="page-link-edit hidden">
              <input type="text" id="pageLinkInput" placeholder="ex: 22-23" />
              <span class="confirm-hint">Enter para confirmar</span>
            </div>
          </header>
          <div class="editor-wrapper">
            <textarea id="noteEditor" class="note-editor" placeholder="Comece a escrever..." spellcheck="false" autofocus></textarea>
            <div id="notePreview" class="note-preview hidden"></div>
          </div>
          <footer class="page-footer">
            <span id="wordCount">0 palavras</span>
            <span id="saveStatus">Salvo</span>
          </footer>
        </div>
        <nav class="panel-nav notebook-nav">
          <button id="notePrev" class="btn btn-icon" title="Folha anterior (Alt ←)">‹</button>
          <div class="nav-pages">
            <span>Folha</span>
            <span id="noteIndex">0</span>
            <span class="nav-sep">/</span>
            <span id="noteTotal">0</span>
          </div>
          <button id="noteNext" class="btn btn-icon" title="Próxima folha (Alt →)">›</button>
          <button id="newNotePage" class="btn btn-primary btn-small" title="Nova folha (Alt N)">+ Nova</button>
        </nav>
      </section>
    </main>
  </div>

  <div id="restoreBanner" class="restore-banner hidden" role="status">
    <span>Restaurar sessão anterior?</span>
    <button id="restoreYes" class="btn btn-primary btn-small">Restaurar</button>
    <button id="restoreNo" class="btn btn-ghost btn-small">Descartar</button>
  </div>

  <!-- PDF.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <!-- Marked.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
